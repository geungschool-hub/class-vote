<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>학급 임원 선거</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --paper:#f5f2ea; --card:#fffdf7; --ink:#1d1d1d; --sub:#6b6455;
  --navy:#1c2b4a; --gold:#a8874a; --stamp:#b3261e; --line:#cfc7b4;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Noto Sans KR',sans-serif; background:var(--paper); color:var(--ink);
  display:flex; flex-direction:column; align-items:center; min-height:100dvh;
  padding:0 16px env(safe-area-inset-bottom);
}
.top-band{width:100vw; background:var(--navy); color:#f0ead8; text-align:center; padding:14px 10px 12px;}
.top-band .small{font-size:11px; letter-spacing:6px; color:#c9b98a; margin-bottom:3px;}
.top-band .title{font-family:'Noto Serif KR',serif; font-size:21px; font-weight:700; letter-spacing:3px;}
.top-rule{width:100vw; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent);}
main{width:100%; max-width:440px; flex:1; display:flex; flex-direction:column; align-items:center; padding:26px 0 10px;}
.scr{display:none; width:100%; flex-direction:column; align-items:center;}
.scr.on{display:flex;}
.note{font-size:16px; color:var(--sub); text-align:center; line-height:1.9; letter-spacing:1px;}
.note b{color:var(--ink);}
.serif{font-family:'Noto Serif KR',serif;}

/* login */
.lgl{font-family:'Noto Serif KR',serif; font-size:18px; font-weight:600; letter-spacing:4px; margin-bottom:18px;}
#sidInp{
  width:230px; font-size:26px; text-align:center; letter-spacing:8px; padding:12px 6px;
  border:none; border-bottom:2px solid var(--navy); background:transparent; outline:none;
  font-family:'Noto Serif KR',serif;
}
#sidInp:focus{border-bottom-color:var(--gold);}
.btn{
  min-height:52px; padding:0 34px; font-size:17px; font-weight:700; letter-spacing:4px;
  border:none; border-radius:4px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
}
.btn.navy{background:var(--navy); color:#f0ead8;}
.btn.navy:disabled{background:#9aa2b1; color:#e8e8e8;}
.btn.ghost{background:transparent; color:var(--sub); border:1px solid var(--line);}
.btn.red{background:var(--stamp); color:#fff;}
#loginBtn{margin-top:30px;}
.errmsg{min-height:22px; margin-top:14px; font-size:14px; color:var(--stamp); letter-spacing:1px;}

/* ballot paper */
.paper{
  width:100%; background:var(--card); border:1.5px solid var(--ink); position:relative;
  box-shadow:0 3px 14px rgba(40,32,10,.14); padding:4px;
}
.paper-inner{border:1px solid var(--ink); padding:18px 16px 22px;}
.paper-head{
  font-family:'Noto Serif KR',serif; text-align:center; font-size:22px; font-weight:900;
  letter-spacing:14px; text-indent:14px; padding-bottom:10px;
}
.paper-sub{
  text-align:center; font-size:13px; color:var(--sub); letter-spacing:3px;
  border-bottom:1.5px solid var(--ink); padding-bottom:12px; margin-bottom:4px;
}
.cand-row{
  display:flex; align-items:stretch; border-bottom:1px solid var(--ink); cursor:pointer;
  min-height:64px; user-select:none;
}
.cand-row:last-child{border-bottom:none;}
.cnum{
  width:64px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-right:1px solid var(--ink); font-family:'Noto Serif KR',serif;
}
.cnum .lab{font-size:10px; color:var(--sub); letter-spacing:2px;}
.cnum .num{font-size:26px; font-weight:900; line-height:1.15;}
.cname{
  flex:1; display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; letter-spacing:6px;
  padding:6px;
}
.cstamp{
  width:84px; border-left:1px dashed #999; display:flex; align-items:center; justify-content:center;
}
.stampmark{
  width:48px; height:48px; color:var(--stamp);
  display:flex; align-items:center; justify-content:center;
  transform:rotate(-8deg); opacity:0; transition:opacity .12s;
}
.stampmark svg{width:100%; height:100%;}
.cand-row.sel .stampmark{opacity:1;}
.cand-row.sel{background:#fbf7ea;}
.yn-cand{
  text-align:center; font-family:'Noto Serif KR',serif; padding:14px 6px 12px;
  border-bottom:1px solid var(--ink); font-size:15px; letter-spacing:2px; color:var(--sub);
}
.yn-cand b{font-size:24px; font-weight:900; color:var(--ink); letter-spacing:8px; display:block; margin-top:4px;}
.paper-guide{margin-top:16px; font-size:13px; color:var(--sub); letter-spacing:2px; text-align:center;}
#castBtn{margin-top:22px; width:100%;}

/* modal */
.modal-bg{
  position:fixed; inset:0; background:rgba(15,20,35,.55); display:none;
  align-items:center; justify-content:center; z-index:50; padding:20px;
}
.modal-bg.on{display:flex;}
.modal{
  background:var(--card); border:1.5px solid var(--navy); max-width:340px; width:100%;
  padding:28px 22px 20px; text-align:center;
}
.modal .m-title{font-family:'Noto Serif KR',serif; font-size:20px; font-weight:700; letter-spacing:2px; margin-bottom:10px;}
.modal .m-sub{font-size:13.5px; color:var(--sub); letter-spacing:1px; line-height:1.8; margin-bottom:22px;}
.modal .m-btns{display:flex; gap:10px;}
.modal .btn{flex:1; padding:0; letter-spacing:2px;}

/* done */
.boxwrap{position:relative; width:200px; height:190px; margin-bottom:8px;}
.slip{
  position:absolute; left:50%; top:-6px; width:64px; height:40px; margin-left:-32px;
  background:var(--card); border:1.5px solid var(--ink); z-index:1;
  animation:drop 1.1s ease-in .2s forwards;
}
@keyframes drop{
  0%{transform:translateY(0) rotate(0);}
  55%{transform:translateY(52px) rotate(3deg); opacity:1;}
  100%{transform:translateY(92px) rotate(3deg); opacity:0;}
}
.seal{
  width:120px; height:120px; border-radius:50%; border:4px solid var(--stamp); color:var(--stamp);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Noto Serif KR',serif; font-size:26px; font-weight:900; letter-spacing:6px; text-indent:6px;
  transform:rotate(-10deg) scale(0); line-height:1.4; margin:18px 0 6px;
  animation:sealin .5s cubic-bezier(.2,1.6,.4,1) 1.25s forwards;
}
.seal.now{animation-delay:.05s;}
@keyframes sealin{to{transform:rotate(-10deg) scale(1);}}
.done-txt{font-family:'Noto Serif KR',serif; font-size:18px; letter-spacing:4px; margin-top:8px; color:var(--ink);}

/* result */
.res-badge{
  font-family:'Noto Serif KR',serif; font-size:15px; letter-spacing:8px; text-indent:8px;
  color:var(--gold); border:1px solid var(--gold); padding:6px 18px; margin-bottom:22px;
}
.res-main{font-family:'Noto Serif KR',serif; font-size:30px; font-weight:900; letter-spacing:4px; text-align:center; line-height:1.6;}
.res-label{
  font-family:'Noto Serif KR',serif; font-size:20px; color:var(--stamp); font-weight:700;
  letter-spacing:10px; text-indent:10px; margin-top:16px;
}
.res-counts{margin-top:26px; font-size:14px; color:var(--sub); letter-spacing:2px; line-height:2.1; text-align:center;}

footer{padding:14px 0 18px; font-size:11px; color:#a49c8a; letter-spacing:.5px;}
</style>
</head>
<body>
<div class="top-band">
  <div class="small">학 급 임 원 선 거</div>
  <div class="title" id="hdTitle">투표소</div>
</div>
<div class="top-rule"></div>

<main>
  <section class="scr on" id="scrLoad">
    <p class="note">연결 중…</p>
  </section>

  <section class="scr" id="scrErr">
    <p class="note">연결에 실패했습니다.<br>네트워크 확인 후 새로고침해 주세요.</p>
  </section>

  <section class="scr" id="scrIdle">
    <p class="note serif" style="font-size:18px;">현재 진행 중인 투표가 없습니다.</p>
  </section>

  <section class="scr" id="scrLogin">
    <div class="lgl">선거인 확인</div>
    <input id="sidInp" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="학번" autocomplete="off">
    <div class="errmsg" id="loginMsg"></div>
    <button class="btn navy" id="loginBtn">확 인</button>
  </section>

  <section class="scr" id="scrBallot">
    <div class="paper">
      <div class="paper-inner">
        <div class="paper-head">투 표 용 지</div>
        <div class="paper-sub" id="paperSub"></div>
        <div id="candList"></div>
      </div>
    </div>
    <div class="paper-guide" id="paperGuide">한 곳에만 기표하세요</div>
    <button class="btn navy" id="castBtn" disabled>투 표</button>
    <div class="errmsg" id="castMsg"></div>
  </section>

  <section class="scr" id="scrDone">
    <div class="boxwrap" id="doneAnim">
      <div class="slip" id="doneSlip"></div>
      <svg viewBox="0 0 200 160" width="200" height="150" style="position:absolute;bottom:0;">
        <rect x="30" y="52" width="140" height="96" fill="#1c2b4a" stroke="#a8874a" stroke-width="2"/>
        <rect x="22" y="40" width="156" height="14" fill="#16233c" stroke="#a8874a" stroke-width="2"/>
        <rect x="72" y="44" width="56" height="5" rx="2" fill="#0b1220"/>
        <text x="100" y="110" text-anchor="middle" fill="#c9b98a" font-size="17" letter-spacing="6" font-family="'Noto Serif KR',serif">투표함</text>
      </svg>
    </div>
    <div class="seal" id="doneSeal">투표<br>완료</div>
    <div class="done-txt">투표가 완료되었습니다</div>
  </section>

  <section class="scr" id="scrWait">
    <p class="note serif" style="font-size:18px;" id="waitTxt">투표가 마감되었습니다</p>
  </section>

  <section class="scr" id="scrResult">
    <div class="res-badge">선 거 결 과</div>
    <div class="res-main" id="resMain"></div>
    <div class="res-label" id="resLabel"></div>
    <div class="res-counts" id="resCounts"></div>
  </section>
</main>

<div class="modal-bg" id="cfmBg">
  <div class="modal">
    <div class="m-title" id="cfmTitle"></div>
    <div class="m-sub">투표 후에는 변경할 수 없습니다</div>
    <div class="m-btns">
      <button class="btn ghost" id="cfmNo">취소</button>
      <button class="btn navy" id="cfmYes">투표</button>
    </div>
  </div>
</div>

<footer>Claude AI로 이 앱을 제작함 by 고은표</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDbEgNhJr24GjWPYBx63zQ4MyW2dZA6XSs",
  authDomain: "gongju7-vocab.firebaseapp.com",
  databaseURL: "https://gongju7-vocab-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gongju7-vocab",
  storageBucket: "gongju7-vocab.firebasestorage.app",
  messagingSenderId: "249343659059",
  appId: "1:249343659059:web:532b7d74d0a38286c2a746"
};
const FB={ready:false, db:null};
try{
  firebase.initializeApp(firebaseConfig);
  firebase.auth().signOut().catch(function(){});
  FB.db=firebase.database(); FB.ready=true;
}catch(e){}

const $=function(id){return document.getElementById(id);};
const ROOT='vote';
let eid, E=null, elRef=null;
let sid=null, sidOK=false, choice=null, renderKey='__init';
let castBusy=false, doneShownFor=null, notice='';

function toArr(v){ if(!v) return []; return Array.isArray(v)?v.filter(Boolean):Object.values(v); }
function show(id){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  $(id).classList.add('on');
}
function votedLocal(){ return eid ? localStorage.getItem('cv.voted.'+eid) : null; }
function calcKey(){
  const st=E?E.status:'none';
  let ex='';
  if(E && st==='open'){ const vs=votedLocal(); ex=vs?((E.voters&&E.voters[vs])?'v1':'v0'):'v-'; }
  return String(eid)+'|'+st+'|'+ex;
}

let gotData=false;
setTimeout(function(){ if(!gotData) show('scrErr'); }, 12000);
if(!FB.ready){ show('scrErr'); }
else{
  FB.db.ref(ROOT+'/current').on('value', function(s){
    gotData=true;
    const v=s.val()||null;
    if(v===eid) return;
    eid=v; sidOK=false; choice=null;
    if(elRef){ elRef.off(); elRef=null; }
    E=null;
    if(!eid){ renderKey='__x'; render(true); return; }
    elRef=FB.db.ref(ROOT+'/elections/'+eid);
    elRef.on('value', function(ss){ E=ss.val(); render(false); });
  }, function(){ show('scrErr'); });
}

function render(force){
  const st=E?E.status:'none';
  const key=calcKey();
  if(!force && key===renderKey) return;
  renderKey=key;
  $('hdTitle').textContent=(E&&E.title)?E.title:'투표소';

  if(!eid || !E){ show('scrIdle'); return; }
  if(st==='open'){
    const vs=votedLocal();
    if(vs){
      if(E.voters && E.voters[vs]){
        if(doneShownFor!==eid) showDone(false);
        return;
      }
      localStorage.removeItem('cv.voted.'+eid);
      doneShownFor=null; sidOK=false; sid=null;
      notice='명부에서 삭제되었습니다 — 다시 투표해 주세요';
    }
    if(!sidOK){ $('loginMsg').textContent=notice; show('scrLogin'); return; }
    buildBallot(); show('scrBallot'); return;
  }
  if(st==='closed'){ $('waitTxt').textContent='투표가 마감되었습니다'; show('scrWait'); return; }
  if(st==='counting'){ $('waitTxt').textContent='개표가 진행 중입니다'; show('scrWait'); return; }
  if(st==='done'){ buildResult(); show('scrResult'); return; }
  show('scrIdle');
}

/* ---- login ---- */
$('loginBtn').addEventListener('click', doLogin);
$('sidInp').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const v=$('sidInp').value.trim();
  if(!/^\d{3,6}$/.test(v)){ $('loginMsg').textContent='학번을 정확히 입력하세요'; return; }
  $('loginBtn').disabled=true;
  FB.db.ref(ROOT+'/elections/'+eid+'/voters/'+v).once('value').then(function(s){
    $('loginBtn').disabled=false;
    if(s.exists()){ $('loginMsg').textContent='이미 투표한 학번입니다'; return; }
    sid=v; sidOK=true; notice=''; render(true);
  }).catch(function(){ $('loginBtn').disabled=false; $('loginMsg').textContent='확인 실패 — 다시 시도하세요'; });
}

/* ---- ballot ---- */
function buildBallot(){
  const cands=toArr(E.candidates);
  const yesno=(E.mode==='yesno');
  $('paperSub').textContent=E.title||'';
  choice=null; $('castBtn').disabled=true; $('castMsg').textContent='';
  let html='';
  if(yesno){
    const c=cands[0]||{n:1,name:''};
    html+='<div class="yn-cand">후보자<b>'+esc(c.name)+'</b></div>';
    html+=candRow('yes','찬성');
    html+=candRow('no','반대');
    $('paperGuide').textContent='찬성 또는 반대 한 곳에 기표하세요';
  }else{
    cands.forEach(function(c){ html+=candRow(String(c.n), c.name, c.n); });
    $('paperGuide').textContent='한 곳에만 기표하세요';
  }
  $('candList').innerHTML=html;
  document.querySelectorAll('.cand-row').forEach(function(row){
    row.addEventListener('click', function(){
      document.querySelectorAll('.cand-row').forEach(function(r){r.classList.remove('sel');});
      row.classList.add('sel');
      choice=row.getAttribute('data-c');
      $('castBtn').disabled=false;
    });
  });
}
const STAMP_SVG='<svg viewBox="0 0 48 48" aria-hidden="true">'
  +'<circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="3.5"/>'
  +'<line x1="24" y1="11" x2="24" y2="37" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>'
  +'<line x1="24" y1="21" x2="34" y2="32" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>'
  +'</svg>';
function candRow(c, label, num){
  const numCell = num
    ? '<div class="cnum"><span class="lab">기호</span><span class="num">'+num+'</span></div>'
    : '';
  return '<div class="cand-row" data-c="'+c+'">'
    + numCell
    + '<div class="cname">'+esc(label)+'</div>'
    + '<div class="cstamp"><div class="stampmark">'+STAMP_SVG+'</div></div></div>';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];}); }

$('castBtn').addEventListener('click', function(){
  if(!choice) return;
  let t;
  if(E.mode==='yesno'){ t=(choice==='yes'?'찬성':'반대'); }
  else{
    const c=toArr(E.candidates).find(function(x){return String(x.n)===choice;});
    t='기호 '+choice+'번 '+(c?c.name:'');
  }
  $('cfmTitle').textContent=t;
  $('cfmBg').classList.add('on');
});
$('cfmNo').addEventListener('click', function(){ $('cfmBg').classList.remove('on'); });
$('cfmYes').addEventListener('click', cast);

function cast(){
  if(castBusy||!choice||!sid) return;
  if(!E||E.status!=='open'){ $('cfmBg').classList.remove('on'); render(true); return; }
  castBusy=true; $('cfmYes').disabled=true;
  const bref=FB.db.ref(ROOT+'/elections/'+eid+'/ballots').push();
  const vref=FB.db.ref(ROOT+'/elections/'+eid+'/voters/'+sid);
  vref.transaction(function(cur){ return cur===null?{t:Date.now(), b:bref.key}:undefined; }, function(err,committed){
    if(err){ fail('오류가 발생했습니다 — 다시 시도하세요'); return; }
    if(!committed){
      castBusy=false; $('cfmYes').disabled=false; $('cfmBg').classList.remove('on');
      sidOK=false; render(true);
      $('loginMsg').textContent='이미 투표한 학번입니다';
      return;
    }
    bref.set({c:(E.mode==='yesno')?choice:Number(choice)})
      .then(function(){
        localStorage.setItem('cv.voted.'+eid, sid);
        castBusy=false; $('cfmYes').disabled=false; $('cfmBg').classList.remove('on');
        showDone(true);
      })
      .catch(function(){
        vref.remove().catch(function(){});
        fail('전송 실패 — 다시 시도하세요');
      });
  });
  function fail(msg){
    castBusy=false; $('cfmYes').disabled=false; $('cfmBg').classList.remove('on');
    $('castMsg').textContent=msg;
  }
}

function showDone(animate){
  doneShownFor=eid; renderKey=calcKey();
  $('doneSlip').style.display=animate?'block':'none';
  if(!animate) $('doneSeal').classList.add('now');
  show('scrDone');
}

/* ---- result ---- */
function buildResult(){
  const r=E.result||{};
  const cands=toArr(E.candidates);
  let main='', label=r.label||'', counts='';
  if(E.mode==='yesno'){
    const c=cands[0]||{name:''};
    main=esc(c.name);
    counts='찬성 '+(r.yes||0)+'표 · 반대 '+(r.no||0)+'표';
  }else{
    if(r.win!=null){
      const w=cands.find(function(x){return x.n===r.win;});
      main='기호 '+r.win+'번<br>'+esc(w?w.name:'');
    }else{
      main='—'; label=label||'동점';
    }
    const cc=r.counts||{};
    counts=cands.map(function(c){ return '기호 '+c.n+'번 '+esc(c.name)+' — '+(cc[c.n]||0)+'표'; }).join('<br>');
  }
  $('resMain').innerHTML=main;
  $('resLabel').textContent=label;
  $('resCounts').innerHTML=counts;
}
</script>
</body>
</html>
